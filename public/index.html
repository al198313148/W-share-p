<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="pageTitle">PDF共享与管理系统</title>
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="header-content">
                <h1 data-i18n="systemName">PDF共享与管理系统</h1>
                <p class="subtitle" data-i18n="systemSubtitle">实时共享和查看PDF文档</p>
                <div class="header-controls">
                    <div class="mode-switch">
                        <button id="mode-share" class="mode-btn active" data-i18n="shareMode">共享模式</button>
                        <button id="mode-report" class="mode-btn" data-i18n="reportMode">审核模式</button>
                    </div>
                    <div class="user-info">
                        <span id="username-display" data-i18n="user">用户</span>
                        <button id="change-password-btn" class="btn btn-secondary" data-i18n="changePassword">修改密码</button>
                        <button id="logout-btn" class="btn btn-secondary" data-i18n="logout">退出</button>
                    </div>
                </div>
            </div>
        </header>
        
        <main>
            <div class="pdf-list-container">
                <div class="list-header">
                    <h2 id="mode-title" data-i18n="availablePdfs">可用PDF文档</h2>
                    <div class="controls">
                        <button id="refresh-btn" class="btn" data-i18n="refresh">刷新列表</button>
                        <button id="backup-btn" class="btn btn-secondary" data-i18n="backup">备份全部</button>
                        <div class="search-box">
                            <input type="text" id="search-input" data-i18n-placeholder="searchPdfs" placeholder="搜索PDF文档...">
                        </div>
                    </div>
                </div>
                
                <div id="pdf-list" class="pdf-list">
                    <div class="empty-state" id="empty-state">
                        <p data-i18n="noPdfsFound">没有找到PDF文件</p>
                        <p data-i18n="addPdfsToSharedFolder">请将PDF文件放入相应文件夹</p>
                    </div>
                </div>
            </div>
            
            <div class="pdf-viewer-container" id="pdf-viewer-container">
                <div class="viewer-header">
                    <h3 id="pdf-title">PDF查看器</h3>
                    <div class="viewer-controls">
                        <button id="print-btn" class="btn" data-i18n="print">打印</button>
                        <button id="close-viewer" class="btn btn-secondary" data-i18n="close">关闭</button>
                    </div>
                </div>
                <div class="pdf-viewer">
                    <iframe id="pdf-frame" src="" frameborder="0"></iframe>
                </div>
            </div>
        </main>
        
        <footer>
            <p>Copyright © 2026 All rights reserved | Supported by Leo</p>
        </footer>
    </div>
    
    <!-- PDF全屏查看模态框 -->
    <div id="pdf-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-pdf-title">PDF文档</h3>
                <div class="modal-controls">
                    <button id="modal-print-btn" class="btn" data-i18n="print">打印</button>
                    <button id="modal-close-btn" class="btn btn-secondary" data-i18n="close">关闭</button>
                </div>
            </div>
            <div class="modal-body">
                <iframe id="modal-pdf-frame" src="" frameborder="0"></iframe>
            </div>
        </div>
    </div>
    
    <!-- 修改密码模态框 -->
    <div id="password-modal" class="modal">
        <div class="modal-content" style="max-width: 400px; height: auto;">
            <div class="modal-header">
                <h3 data-i18n="changePassword">修改密码</h3>
                <button class="modal-close-btn" onclick="closePasswordModal()">&times;</button>
            </div>
            <div class="modal-body">
                <form id="password-form">
                    <div class="form-group">
                        <label for="change-username" data-i18n="username">用户名</label>
                        <input type="text" id="change-username" required>
                    </div>
                    <div class="form-group">
                        <label for="new-password" data-i18n="newPassword">新密码</label>
                        <input type="password" id="new-password" required>
                    </div>
                    <div class="form-group">
                        <label for="confirm-password" data-i18n="confirmPassword">确认密码</label>
                        <input type="password" id="confirm-password" required>
                    </div>
                    <button type="submit" class="btn" data-i18n="submit">提交</button>
                </form>
                <div id="password-message" class="message"></div>
            </div>
        </div>
    </div>
    
    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
    <script>
        function closePasswordModal() {
            document.getElementById('password-modal').style.display = 'none';
        }
    </script>
</body>
</html>
